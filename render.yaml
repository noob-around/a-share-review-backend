services:
  - type: web
    name: a-share-review-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: a-share-review-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ENVIRONMENT
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: APP_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-pro

databases:
  - name: a-share-review-db
    databaseName: a_share_review
    plan: free
